<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-label="Casa Brava stone and fire still life">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="55%" stop-color="#231316"/>
      <stop offset="100%" stop-color="#5e5a55"/>
    </linearGradient>
    <radialGradient id="glow" cx="40%" cy="35%" r="55%">
      <stop offset="0%" stop-color="#d8c3a5" stop-opacity="0.45"/>
      <stop offset="35%" stop-color="#b23a2e" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#0d0d0d" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" stitchTiles="stitch"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.2"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="1200" height="900" fill="url(#bg)"/>
  <rect width="1200" height="900" fill="url(#glow)"/>
  <circle cx="890" cy="260" r="130" fill="#b23a2e" opacity="0.2"/>
