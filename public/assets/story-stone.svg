  <rect x="225" y="300" width="250" height="300" rx="28" fill="#2c2420" opacity="0.9"/>
  <circle cx="280" cy="370" r="58" fill="#d8c3a5" opacity="0.15"/>
  <circle cx="345" cy="420" r="72" fill="#b23a2e" opacity="0.45"/>
  <circle cx="415" cy="355" r="48" fill="#f4efe7" opacity="0.1"/>
